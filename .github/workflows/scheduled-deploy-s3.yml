name: Scheduled Deploy to S3

on:
  schedule:
    - cron: '0 19 * * *'  # 8am NZST (UTC+12)

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment date
        id: date_check
        run: |
          TODAY_NZ=$(TZ=Pacific/Auckland date +%d%m%Y)
          if [ "$TODAY_NZ" != "${{ vars.NEXT_AUTO_DEPLOYMENT_DATE_DDMMYYY }}" ]; then
            echo "Today ($TODAY_NZ) does not match deployment date (${{ vars.NEXT_AUTO_DEPLOYMENT_DATE_DDMMYYY }}). Skipping deployment."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "Deployment date matched ($TODAY_NZ). Continuing..."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR
        if: steps.date_check.outputs.should_deploy == 'true'
        run: gh pr merge $PR_NUMBER --repo redlid/redlid-website --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ vars.PR_NUMBER_FOR__AUTO_DEPLOYMENT }}

      - name: Checkout
        if: steps.date_check.outputs.should_deploy == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.date_check.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        if: steps.date_check.outputs.should_deploy == 'true'
        run: npm ci

      - name: Build
        if: steps.date_check.outputs.should_deploy == 'true'
        run: npm run build

      - name: Configure AWS credentials
        if: steps.date_check.outputs.should_deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-6

      - name: Set bucket name
        if: steps.date_check.outputs.should_deploy == 'true'
        id: bucket
        run: echo "name=redlid.co.nz" >> "$GITHUB_OUTPUT"

      - name: Deploy to S3
        if: steps.date_check.outputs.should_deploy == 'true'
        run: aws s3 sync ./dist s3://${{ steps.bucket.outputs.name }} --delete

      - name: Invalidate CloudFront cache
        if: steps.date_check.outputs.should_deploy == 'true'
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='${{ steps.bucket.outputs.name }}']].Id" \
            --output text)
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          fi

      - name: Notify Slack
        if: steps.date_check.outputs.should_deploy == 'true'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-type: application/json; charset=utf-8" \
            --data '{"channel":"#redlid","text":"The auto deployment is completed for ${{ steps.bucket.outputs.name }}."}' \
            https://slack.com/api/chat.postMessage
